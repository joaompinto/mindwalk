<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind Map</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="theme-switcher">
        <button id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
    </div>

    <div class="help">
        <strong>Controls:</strong><br>
        <kbd>Tab</kbd> - Add child node<br>
        <kbd>Insert</kbd> / <kbd>Enter</kbd> - Add sibling node<br>
        <kbd>Delete</kbd> / <kbd>Backspace</kbd> - Delete node<br>
        <kbd>Click</kbd> - Select / Edit<br>
        <kbd>Ctrl+Click</kbd> - Multi-select<br>
        <kbd>Drag</kbd> - Move node<br>
        <kbd>Canvas Drag</kbd> - Select multiple
    </div>

    <svg id="connections"></svg>
    <div id="canvas"></div>

    <div class="controls">
        <button onclick="app.addChild()">Add Child (Tab)</button>
        <button onclick="app.addSibling()">Add Sibling (Ins)</button>
        <button onclick="app.deleteNode()">Delete (Del)</button>
        <button id="btn-save" onclick="app.saveToStorage()">Save</button>
        <button id="btn-load" onclick="app.loadFromStorage()">Load</button>
        <button onclick="app.exportJSON()">Export JSON</button>
        <button onclick="app.clearAll()">Clear All</button>
    </div>

    <script>
        // Theme management
        function getPreferredTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) return savedTheme;
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            updateThemeIcon(theme);
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            setTheme(newTheme);
        }

        function updateThemeIcon(theme) {
            const btn = document.getElementById('theme-toggle');
            btn.textContent = theme === 'dark' ? '☀️' : '🌙';
            btn.title = theme === 'dark' ? 'Switch to light theme' : 'Switch to dark theme';
        }

        // Initialize theme
        setTheme(getPreferredTheme());

        // Listen for system theme changes
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            if (!localStorage.getItem('theme')) {
                setTheme(e.matches ? 'dark' : 'light');
            }
        });

        class MindMap {
            constructor() {
                this.canvas = document.getElementById('canvas');
                this.svg = document.getElementById('connections');
                this.nodes = new Map();
                this.nextId = 1;
                this.selectedId = null;
                this.selectedIds = new Set(); // Multiple selection
                this.draggingId = null;
                this.isPanning = false;
                this.panStart = { x: 0, y: 0 };
                this.canvasOffset = { x: 0, y: 0 };
                
                // Selection box
                this.isSelecting = false;
                this.selectionStart = { x: 0, y: 0 };
                this.selectionBox = null;
                
                // Grid settings
                this.gridSize = 10;
                this.snapToGrid = true;
                
                this.init();
            }

            snap(value) {
                if (!this.snapToGrid) return value;
                return Math.round(value / this.gridSize) * this.gridSize;
            }

            init() {
                // Check if running from file: protocol
                const isFileProtocol = window.location.protocol === 'file:';
                
                // Try to load saved mind map if running via HTTP/HTTPS
                if (!isFileProtocol) {
                    const saved = localStorage.getItem('mindmap');
                    if (saved) {
                        this.loadFromStorageSilent();
                        this.setupEvents();
                        return;
                    }
                }
                
                // Create root node if no saved data
                this.createNode(null, 'Central Topic', this.snap(window.innerWidth / 2 - 60), this.snap(window.innerHeight / 2 - 20), true);
                
                this.setupEvents();
            }

            loadFromStorageSilent() {
                const saved = localStorage.getItem('mindmap');
                if (!saved) return;
                
                const data = JSON.parse(saved);
                
                // Clear current
                this.canvas.innerHTML = '';
                this.svg.innerHTML = '';
                this.nodes.clear();
                
                // Restore data
                this.nextId = data.nextId;
                for (const node of data.nodes) {
                    this.nodes.set(node.id, node);
                }
                
                // Re-render
                for (const node of this.nodes.values()) {
                    this.renderNode(node);
                }
                this.renderConnections();
                
                // Select root node
                const rootNode = Array.from(this.nodes.values()).find(n => n.isRoot);
                if (rootNode) {
                    this.selectNode(rootNode.id);
                } else {
                    this.selectedId = null;
                }
            }

            createNode(parentId, text = 'New Node', x, y, isRoot = false, skipReposition = false, autoEdit = false, insertAfterOrder = null) {
                const id = this.nextId++;
                
                // Calculate order for child nodes
                let order = 0;
                if (parentId !== null) {
                    const siblings = Array.from(this.nodes.values()).filter(n => n.parentId === parentId);
                    
                    // First, ensure all existing siblings have an order assigned
                    siblings.sort((a, b) => (a.order ?? 999999) - (b.order ?? 999999));
                    siblings.forEach((sibling, index) => {
                        if (sibling.order === undefined) {
                            sibling.order = index;
                        }
                    });
                    
                    if (insertAfterOrder !== null) {
                        // Insert after the specified order
                        order = insertAfterOrder + 1;
                        // Increment order of all siblings that come after
                        for (const sibling of siblings) {
                            if (sibling.order >= order) {
                                sibling.order++;
                            }
                        }
                    } else {
                        // Add to the end
                        order = siblings.length;
                    }
                }
                
                const node = {
                    id,
                    parentId,
                    text,
                    x: x || 0,
                    y: y || 0,
                    isRoot,
                    order
                };

                if (parentId !== null && x === undefined) {
                    // Position will be calculated after adding to nodes
                    const parent = this.nodes.get(parentId);
                    node.x = parent.x;
                    node.y = parent.y + 100;
                }

                this.nodes.set(id, node);
                this.renderNode(node);
                
                // Calculate proper position for child nodes
                if (parentId !== null && x === undefined && !skipReposition) {
                    this.repositionChildren(parentId);
                }
                
                this.renderConnections();
                this.selectNode(id);
                
                // Auto-enter edit mode if requested
                if (autoEdit) {
                    setTimeout(() => this.editNode(id), 0);
                }
                
                return id;
            }

            renderNode(node) {
                const el = document.createElement('div');
                el.className = `node ${node.isRoot ? 'root' : ''}`;
                el.id = `node-${node.id}`;
                el.style.left = `${node.x}px`;
                el.style.top = `${node.y}px`;
                el.innerHTML = `<span>${this.escapeHtml(node.text)}</span>`;
                
                el.addEventListener('mousedown', (e) => this.onNodeMouseDown(e, node.id));
                el.addEventListener('click', (e) => this.onNodeClick(e, node.id));
                el.addEventListener('dblclick', (e) => this.onNodeDoubleClick(e, node.id));
                
                this.canvas.appendChild(el);
            }

            updateNode(node) {
                const el = document.getElementById(`node-${node.id}`);
                if (el) {
                    el.style.left = `${node.x}px`;
                    el.style.top = `${node.y}px`;
                    if (!el.querySelector('input')) {
                        el.querySelector('span').textContent = node.text;
                    }
                }
            }

            renderConnections() {
                this.svg.innerHTML = '';
                
                for (const node of this.nodes.values()) {
                    if (node.parentId !== null) {
                        const parent = this.nodes.get(node.parentId);
                        if (parent) {
                            this.drawConnection(parent, node);
                        }
                    }
                }
            }

            drawConnection(parent, child) {
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                
                const startX = parent.x + 40;
                const startY = parent.y + 20;
                const endX = child.x + 40;
                const endY = child.y + 20;
                
                // Angular tree-style connection: vertical line down, then horizontal
                const midY = (startY + endY) / 2;
                const d = `M ${startX} ${startY} L ${startX} ${midY} L ${endX} ${midY} L ${endX} ${endY}`;
                path.setAttribute('d', d);
                
                this.svg.appendChild(path);
            }

            selectNode(id, multiSelect = false) {
                if (!multiSelect) {
                    // Clear previous selection
                    for (const selId of this.selectedIds) {
                        const prev = document.getElementById(`node-${selId}`);
                        if (prev) prev.classList.remove('selected');
                    }
                    this.selectedIds.clear();
                    
                    if (this.selectedId !== null) {
                        const prev = document.getElementById(`node-${this.selectedId}`);
                        if (prev) prev.classList.remove('selected');
                    }
                    
                    this.selectedId = id;
                    
                    if (id !== null) {
                        const el = document.getElementById(`node-${id}`);
                        if (el) el.classList.add('selected');
                        this.selectedIds.add(id);
                    }
                } else {
                    // Multi-select mode
                    if (id === null) return;
                    
                    if (this.selectedIds.has(id)) {
                        // Deselect if already selected
                        this.selectedIds.delete(id);
                        const el = document.getElementById(`node-${id}`);
                        if (el) el.classList.remove('selected');
                        if (this.selectedId === id) {
                            this.selectedId = this.selectedIds.size > 0 ? Array.from(this.selectedIds)[0] : null;
                        }
                    } else {
                        // Add to selection
                        this.selectedIds.add(id);
                        this.selectedId = id;
                        const el = document.getElementById(`node-${id}`);
                        if (el) el.classList.add('selected');
                    }
                }
            }

            selectNodesInBox(x1, y1, x2, y2) {
                const minX = Math.min(x1, x2);
                const maxX = Math.max(x1, x2);
                const minY = Math.min(y1, y2);
                const maxY = Math.max(y1, y2);
                
                for (const node of this.nodes.values()) {
                    const nodeCenterX = node.x + 40; // node width/2
                    const nodeCenterY = node.y + 20; // node height/2
                    
                    if (nodeCenterX >= minX && nodeCenterX <= maxX &&
                        nodeCenterY >= minY && nodeCenterY <= maxY) {
                        this.selectedIds.add(node.id);
                        const el = document.getElementById(`node-${node.id}`);
                        if (el) el.classList.add('selected');
                    }
                }
                
                // Update primary selection
                if (this.selectedIds.size > 0) {
                    this.selectedId = Array.from(this.selectedIds)[0];
                }
            }

            onNodeMouseDown(e, id) {
                if (e.shiftKey) return;
                e.stopPropagation();
                this.draggingId = id;
                this.selectNode(id);
            }

            onNodeClick(e, id) {
                e.stopPropagation();
                const multiSelect = e.ctrlKey || e.metaKey;
                this.selectNode(id, multiSelect);
            }

            onNodeDoubleClick(e, id) {
                e.stopPropagation();
                this.editNode(id);
            }

            editNode(id) {
                const node = this.nodes.get(id);
                const el = document.getElementById(`node-${id}`);
                const span = el.querySelector('span');
                
                // Already in edit mode
                if (!span) return;
                
                const input = document.createElement('input');
                input.value = node.text;
                input.addEventListener('input', (e) => {
                    // Calculate required width
                    const tempSpan = document.createElement('span');
                    tempSpan.style.font = window.getComputedStyle(input).font;
                    tempSpan.style.fontSize = window.getComputedStyle(input).fontSize;
                    tempSpan.style.fontFamily = window.getComputedStyle(input).fontFamily;
                    tempSpan.style.fontWeight = window.getComputedStyle(input).fontWeight;
                    tempSpan.style.letterSpacing = window.getComputedStyle(input).letterSpacing;
                    tempSpan.style.whiteSpace = 'pre';
                    tempSpan.style.position = 'absolute';
                    tempSpan.style.visibility = 'hidden';
                    tempSpan.textContent = input.value || ' ';
                    document.body.appendChild(tempSpan);
                    const textWidth = tempSpan.getBoundingClientRect().width;
                    document.body.removeChild(tempSpan);
                    
                    // Add padding to ensure text fits comfortably
                    input.style.width = (textWidth + 10) + 'px';
                });
                input.addEventListener('blur', () => this.finishEdit(id, input.value));
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.stopPropagation();
                        this.finishEdit(id, input.value);
                    }
                });
                
                span.replaceWith(input);
                
                // Trigger input event to set initial width
                input.dispatchEvent(new Event('input'));
                
                input.focus();
                input.select();
            }

            finishEdit(id, text) {
                const node = this.nodes.get(id);
                if (!node) return;
                
                node.text = text.trim() || 'New Node';
                
                const el = document.getElementById(`node-${id}`);
                if (!el) return;
                
                const input = el.querySelector('input');
                if (!input) return; // Already finished editing
                
                // Check if input is still connected to DOM
                if (!input.isConnected) return;
                
                const span = document.createElement('span');
                span.textContent = node.text;
                
                try {
                    input.replaceWith(span);
                } catch (e) {
                    // Input was already removed, ignore error
                }
            }

            addChild() {
                if (this.selectedId === null) return;
                return this.createNode(this.selectedId, '', undefined, undefined, false, false, true);
            }

            repositionChildren(parentId) {
                const parent = this.nodes.get(parentId);
                const children = Array.from(this.nodes.values())
                    .filter(n => n.parentId === parentId)
                    .sort((a, b) => a.order - b.order);
                
                console.log('repositionChildren called:', {
                    parentId,
                    childrenCount: children.length,
                    children: children.map(c => ({ id: c.id, order: c.order, text: c.text }))
                });
                
                const verticalSpacing = 100;
                const horizontalSpacing = 160;
                
                // Center the children under the parent with even spacing
                const totalWidth = Math.max(0, children.length - 1) * horizontalSpacing;
                const startX = parent.x - totalWidth / 2;
                
                console.log('repositioning:', { parentX: parent.x, startX, totalWidth });
                
                children.forEach((child, index) => {
                    const newX = this.snap(startX + index * horizontalSpacing);
                    const newY = this.snap(parent.y + verticalSpacing);
                    console.log(`child ${child.id} (${child.text}): order=${child.order}, index=${index}, pos=(${newX}, ${newY})`);
                    child.x = newX;
                    child.y = newY;
                    this.updateNode(child);
                });
                
                this.renderConnections();
            }

            addSibling() {
                if (this.selectedId === null) return;
                const node = this.nodes.get(this.selectedId);
                if (node.parentId === null) {
                    this.addChild();
                } else {
                    this.createNode(node.parentId, '', undefined, undefined, false, true, true, node.order);
                    // Reposition all siblings including the new one
                    this.repositionChildren(node.parentId);
                }
            }

            deleteNode() {
                if (this.selectedIds.size === 0 && this.selectedId === null) return;
                
                // Get all nodes to delete (from multi-selection or single selection)
                const idsToDelete = this.selectedIds.size > 0 ? Array.from(this.selectedIds) : [this.selectedId];
                
                for (const id of idsToDelete) {
                    const node = this.nodes.get(id);
                    if (!node || node.isRoot) continue;
                    
                    // Delete all children recursively
                    this.deleteChildren(id);
                    
                    // Delete node
                    this.nodes.delete(id);
                    const el = document.getElementById(`node-${id}`);
                    if (el) el.remove();
                }
                
                this.selectedIds.clear();
                this.selectedId = null;
                this.renderConnections();
            }

            deleteChildren(parentId) {
                for (const [id, node] of this.nodes) {
                    if (node.parentId === parentId) {
                        this.deleteChildren(id);
                        this.nodes.delete(id);
                        const el = document.getElementById(`node-${id}`);
                        if (el) el.remove();
                    }
                }
            }

            clearAll() {
                if (!confirm('Clear all nodes?')) return;
                
                // Remove any active input elements first to prevent blur events
                const activeInput = document.querySelector('.node input');
                if (activeInput) {
                    // Replace input with span to trigger cleanup
                    const span = document.createElement('span');
                    span.textContent = activeInput.value.trim() || 'New Node';
                    activeInput.replaceWith(span);
                }
                
                this.canvas.innerHTML = '';
                this.svg.innerHTML = '';
                this.nodes.clear();
                this.selectedIds.clear();
                this.nextId = 1;
                this.selectedId = null;
                this.createNode(null, 'Central Topic', this.snap(window.innerWidth / 2 - 60), this.snap(window.innerHeight / 2 - 20), true);
            }

            saveToStorage() {
                const data = {
                    nodes: Array.from(this.nodes.values()),
                    nextId: this.nextId
                };
                localStorage.setItem('mindmap', JSON.stringify(data));
            }

            loadFromStorage() {
                const saved = localStorage.getItem('mindmap');
                if (!saved) return;
                
                const data = JSON.parse(saved);
                
                // Clear current
                this.canvas.innerHTML = '';
                this.svg.innerHTML = '';
                this.nodes.clear();
                
                // Restore data
                this.nextId = data.nextId;
                for (const node of data.nodes) {
                    this.nodes.set(node.id, node);
                }
                
                // Re-render
                for (const node of this.nodes.values()) {
                    this.renderNode(node);
                }
                this.renderConnections();
                
                // Select root node
                const rootNode = Array.from(this.nodes.values()).find(n => n.isRoot);
                if (rootNode) {
                    this.selectNode(rootNode.id);
                } else {
                    this.selectedId = null;
                }
            }

            exportJSON() {
                const data = {
                    nodes: Array.from(this.nodes.values()),
                    nextId: this.nextId,
                    exportedAt: new Date().toISOString()
                };
                const json = JSON.stringify(data, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `mindmap_${new Date().toISOString().slice(0, 10)}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            setupEvents() {
                // Canvas mouse events for selection box
                document.addEventListener('mousedown', (e) => {
                    // Start selection box on canvas click (not on nodes)
                    if (e.target === this.canvas || e.target === document.body || e.target === this.svg) {
                        // Clear selection if not holding Ctrl/Cmd
                        if (!e.ctrlKey && !e.metaKey) {
                            for (const selId of this.selectedIds) {
                                const prev = document.getElementById(`node-${selId}`);
                                if (prev) prev.classList.remove('selected');
                            }
                            this.selectedIds.clear();
                            this.selectedId = null;
                        }
                        
                        this.isSelecting = true;
                        this.selectionStart = { x: e.clientX, y: e.clientY };
                        this.createSelectionBox(e.clientX, e.clientY);
                    }
                });

                document.addEventListener('mousemove', (e) => {
                    if (this.draggingId !== null) {
                        const node = this.nodes.get(this.draggingId);
                        node.x = this.snap(e.clientX - 40);
                        node.y = this.snap(e.clientY - 20);
                        this.updateNode(node);
                        this.renderConnections();
                    } else if (this.isSelecting) {
                        this.updateSelectionBox(e.clientX, e.clientY);
                    }
                });

                document.addEventListener('mouseup', (e) => {
                    this.draggingId = null;
                    
                    if (this.isSelecting) {
                        // Finalize selection
                        const endX = e.clientX;
                        const endY = e.clientY;
                        this.selectNodesInBox(this.selectionStart.x, this.selectionStart.y, endX, endY);
                        this.removeSelectionBox();
                        this.isSelecting = false;
                    }
                });

                // Keyboard shortcuts
                document.addEventListener('keydown', (e) => {
                    if (e.target.tagName === 'INPUT') return;
                    
                    switch (e.key) {
                        case 'Tab':
                            e.preventDefault();
                            this.addChild();
                            break;
                        case 'Enter':
                            this.addSibling();
                            break;
                        case 'Insert':
                            e.preventDefault();
                            this.addSibling();
                            break;
                        case 'Delete':
                        case 'Backspace':
                            this.deleteNode();
                            break;
                    }
                });
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            createSelectionBox(x, y) {
                this.selectionBox = document.createElement('div');
                this.selectionBox.className = 'selection-box';
                this.selectionBox.style.left = `${x}px`;
                this.selectionBox.style.top = `${y}px`;
                this.selectionBox.style.width = '0px';
                this.selectionBox.style.height = '0px';
                document.body.appendChild(this.selectionBox);
            }

            updateSelectionBox(x, y) {
                if (!this.selectionBox) return;
                
                const minX = Math.min(this.selectionStart.x, x);
                const minY = Math.min(this.selectionStart.y, y);
                const width = Math.abs(x - this.selectionStart.x);
                const height = Math.abs(y - this.selectionStart.y);
                
                this.selectionBox.style.left = `${minX}px`;
                this.selectionBox.style.top = `${minY}px`;
                this.selectionBox.style.width = `${width}px`;
                this.selectionBox.style.height = `${height}px`;
            }

            removeSelectionBox() {
                if (this.selectionBox) {
                    this.selectionBox.remove();
                    this.selectionBox = null;
                }
            }
        }

        // Check if running from file: protocol
        const isFileProtocol = window.location.protocol === 'file:';
        
        // Hide save/load buttons if running from file: protocol
        if (isFileProtocol) {
            document.getElementById('btn-save').style.display = 'none';
            document.getElementById('btn-load').style.display = 'none';
        }
        
        const app = new MindMap();
    </script>
</body>
</html>
