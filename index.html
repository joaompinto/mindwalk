<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind Map</title>
    <link rel="stylesheet" href="styles.css">
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>
<body>
    <div class="theme-switcher">
        <button id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
    </div>

    <div class="help" id="help-panel">
        <button class="help-close" onclick="dismissHelp()" title="Dismiss for 1 day">×</button>
        <strong>Controls:</strong><br>
        <kbd>Tab</kbd> - Add child node<br>
        <kbd>Insert</kbd> - Add sibling node<br>
        <kbd>Delete</kbd> - Delete node<br>
        <kbd>Click</kbd> - Select node<br>
        <kbd>Double Click</kbd> - Edit node<br>
        <kbd>Ctrl+Click</kbd> - Multi-select<br>
        <kbd>Shift+Drag</kbd> - Select multiple<br>
        <kbd>Drag</kbd> - Move node freely<br>
        <kbd>Scroll</kbd> - Zoom<br>
        <kbd>Drag canvas</kbd> - Pan
    </div>

    <div id="canvas"></div>

    <div class="controls">
        <button onclick="app.addChild()">Add Child (Tab)</button>
        <button onclick="app.addSibling()">Add Sibling (Ins)</button>
        <button onclick="app.deleteNode()">Delete (Del)</button>
        <button id="btn-save" onclick="app.saveToStorage()">Save</button>
        <button id="btn-load" onclick="app.loadFromStorage()">Load</button>
        <button onclick="app.exportJSON()">Export JSON</button>
        <button onclick="app.clearAll()">Clear All</button>
        <button onclick="app.findNode()">Find Node</button>
    </div>

    <script src="main.js"></script>
</body>
</html>
